<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      background: #0d0f12;
      color: #e2e8f0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      padding: 16px;
    }
    .title { font-size: 11px; font-weight: 600; color: #4ade80; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 12px; }
    .row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #374151; flex-shrink: 0; transition: all 0.3s; }
    .dot.online  { background: #4ade80; box-shadow: 0 0 8px #4ade80; }
    .dot.offline { background: #f87171; }
    .label { color: #9ca3af; font-size: 11px; }
    .status { color: #e2e8f0; font-size: 11px; }
    .divider { height: 1px; background: #1f2937; margin: 10px 0; }
    .hint { color: #4b5563; font-size: 10px; line-height: 1.6; }
    .hint code { color: #38bdf8; }
  </style>
</head>
<body>
  <div class="title">Agent Injector</div>
  <div class="row">
    <div class="dot" id="dot"></div>
    <span class="label">bridge:&nbsp;</span>
    <span class="status" id="statusText">checking...</span>
  </div>
  <div class="divider"></div>
  <div class="hint">
    Type prompts in your terminal.<br>
    Replies are auto-injected here.<br><br>
    Make sure <code>go run agent.go</code> is running.
  </div>
  <script src="popup.js"></script>
</body>
</html>
